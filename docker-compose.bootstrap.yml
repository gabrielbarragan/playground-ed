services:
  nginx-bootstrap:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  certbot_www:
  certbot_certs:

networks:
  internal: